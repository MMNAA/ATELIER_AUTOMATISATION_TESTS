name: API Monitoring

on:
  push:
  schedule:
    - cron: "*/5 * * * *"  # toutes les 5 minutes

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install pytest requests

      - name: Run tests
        run: pytest